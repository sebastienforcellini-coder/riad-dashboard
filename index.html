<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kasbah Blanca Marrakech — Tableau de bord</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f8f7f4;
        color: #1a1a18;
        min-height: 100vh;
      }
      #root { min-height: 100vh; }

      /* CSS Variables — light mode */
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f1efe8;
        --color-background-tertiary: #f8f7f4;
        --color-background-info: #e6f1fb;
        --color-background-danger: #fcebeb;
        --color-background-success: #eaf3de;
        --color-background-warning: #faeeda;
        --color-text-primary: #1a1a18;
        --color-text-secondary: #5f5e5a;
        --color-text-tertiary: #888780;
        --color-text-info: #185fa5;
        --color-text-danger: #a32d2d;
        --color-text-success: #3b6d11;
        --color-text-warning: #854f0b;
        --color-border-tertiary: rgba(26,26,24,0.15);
        --color-border-secondary: rgba(26,26,24,0.3);
        --color-border-primary: rgba(26,26,24,0.4);
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --border-radius-xl: 16px;
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', monospace;
      }

      /* Dark mode */
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1e1e1c;
          --color-background-secondary: #2c2c2a;
          --color-background-tertiary: #141412;
          --color-background-info: #042c53;
          --color-background-danger: #501313;
          --color-background-success: #173404;
          --color-background-warning: #412402;
          --color-text-primary: #f1efe8;
          --color-text-secondary: #b4b2a9;
          --color-text-tertiary: #888780;
          --color-text-info: #85b7eb;
          --color-text-danger: #f09595;
          --color-text-success: #97c459;
          --color-text-warning: #ef9f27;
          --color-border-tertiary: rgba(241,239,232,0.15);
          --color-border-secondary: rgba(241,239,232,0.3);
          --color-border-primary: rgba(241,239,232,0.4);
        }
        body { background: #141412; }
      }

      /* Form elements */
      input, select, textarea {
        font-family: var(--font-sans);
        font-size: 14px;
        color: var(--color-text-primary);
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        padding: 8px 10px;
        outline: none;
        transition: border-color 0.15s;
      }
      input:focus, select:focus { border-color: var(--color-border-primary); }
      button {
        font-family: var(--font-sans);
        font-size: 13px;
        font-weight: 400;
        color: var(--color-text-primary);
        background: transparent;
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        padding: 7px 14px;
        cursor: pointer;
        transition: background 0.12s, transform 0.1s;
      }
      button:hover { background: var(--color-background-secondary); }
      button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
